<!DOCTYPE html>
<html>
<head>
    <title>Business Profile - JobSwipe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="profile">

    <h1>🏢 Create Business Profile</h1>

    <input placeholder="Company name">

    <input placeholder="Business type (example: cafe, shop, construction)">

    <input placeholder="Job position needed">

    <input placeholder="Salary offered">

    <input placeholder="Location">

    <input placeholder="Working hours">

    <textarea placeholder="Describe the job and requirements"></textarea>

    <button>Create Job</button>

</div>

</body>
</html>
