<!DOCTYPE html>
<html>
<head>
    <title>Jobs - JobSwipe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="matchScreen" class="match-screen">

    <h1>🎉 It's a Match!</h1>

    <p>The company is interested in you.</p>

    <button onclick="closeMatch()">Continue</button>

</div>
    
<div class="app">

    <h1>Available Jobs</h1>

    <div class="card">

        <h2 id="jobTitle"></h2>

        <p id="company"></p>

        <p id="salary"></p>

        <p id="location"></p>

        <button onclick="likeJob()">❤️ Apply</button>

        <button onclick="skipJob()">❌ Skip</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
