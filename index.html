<!DOCTYPE html>
<html>
<head>
    <title>JobSwipe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h2>JobSwipe</h2>
    <div>
        <button>For Workers</button>
        <button>For Businesses</button>
        <button>Login</button>
    </div>
</nav>

<div class="hero">
    <h1>Find Jobs. Find Workers.</h1>
    <p>The easiest way to connect companies with the right people.</p>
</div>
<div class="role-section">

    <h2>What are you looking for?</h2>

    <div class="roles">

        <div class="role-card">
            <h3>👷 Worker</h3>
            <p>Find jobs, show your skills, and match with companies.</p>
            <button>Find Jobs</button>
        </div>


        <div class="role-card">
            <h3>🏢 Business</h3>
            <p>Post jobs and find the right workers.</p>
            <button>Find Workers</button>
        </div>

    </div>

</div>

<div class="app">

    <div class="card">
        <h2 id="jobTitle">Job Title</h2>
        <p id="company">Company:</p>
        <p id="salary">Salary:</p>
        <p id="location">Location:</p>

        <button onclick="likeJob()">❤️ Like</button>
        <button onclick="skipJob()">❌ Skip</button>
    </div>

</div>


<script src="script.js"></script>

</body>
</html>
