<!DOCTYPE html>
<html>
<head>
    <title>JobSwipe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">
    <h1>JobSwipe</h1>
    <p class="subtitle">Find jobs like you find matches</p>

    <div class="card">
        <h2>Barista ☕</h2>
        <p>Company: Milano Coffee</p>
        <p>Salary: €600/month</p>
        <p>Location: Ferizaj</p>
        <button onclick="likeJob()">❤️ Like</button>
        <button onclick="skipJob()">❌ Skip</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
